name: Documentation Improvement
description: Suggest improvements to our documentation
title: "[Docs]: "
labels: ["documentation"]
assignees:
  - octocat
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to improve our documentation!
  - type: input
    id: doc-link
    attributes:
      label: Documentation Link
      description: Please provide a link to the documentation you'd like to improve.
      placeholder: https://example.com/docs/page
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Suggested Improvement
      description: Please describe what you'd like to see improved in the documentation.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason for Improvement
      description: Why do you think this improvement is necessary?
  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any additional context or information that might be helpful?
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://example.com)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true

