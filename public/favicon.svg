<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="#4a5568" />
  <circle cx="50" cy="50" r="42" fill="none" stroke="#e2e8f0" stroke-width="2" />
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="24" fill="#e2e8f0" text-anchor="middle" dominant-baseline="middle">&lt;/&gt;</text>
  <line x1="50" y1="50" x2="50" y2="20" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" transform="rotate(0 50 50)">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="60s" repeatCount="indefinite" />
  </line>
  <line x1="50" y1="50" x2="75" y2="50" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" transform="rotate(0 50 50)">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="3600s" repeatCount="indefinite" />
  </line>
</svg>

